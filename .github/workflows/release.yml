name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet publish BeatmapExporterCLI -c Release
      - run: dotnet publish BeatmapExporterGUI.Desktop -c Release

      - name: Package CLI
        run: Compress-Archive -Path "BeatmapExporterCLI/bin/Release/net10.0/publish/*" -DestinationPath "BeatmapExporterCLI.zip"

      - name: Package Desktop
        run: Compress-Archive -Path "BeatmapExporterGUI.Desktop/bin/Release/net10.0/publish/*" -DestinationPath "BeatmapExporterGUI.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            BeatmapExporterCLI.zip
            BeatmapExporterGUI.zip
          generate_release_notes: true
