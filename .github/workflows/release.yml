name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      matrix:
        project:
          - name: CLI
            path: BeatmapExporterCLI
          - name: Desktop
            path: BeatmapExporterGUI.Desktop
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      - run: dotnet publish ${{ matrix.project.path }} -c Release

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path "${{ matrix.project.path }}/bin/Release/net10.0/publish/*" -DestinationPath "${{ matrix.project.name }}-${{ runner.os }}.zip"

      - name: Archive (Unix)
        if: runner.os != 'Windows'
        run: tar -czf "${{ matrix.project.name }}-${{ runner.os }}.tar.gz" -C "${{ matrix.project.path }}/bin/Release/net10.0/publish" .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.name }}-${{ runner.os }}
          path: ${{ matrix.project.name }}-${{ runner.os }}.*

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Collect artifacts
        run: |
          mkdir release
          find . -name "*.zip" -o -name "*.tar.gz" | while read f; do
            cp "$f" release/
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
