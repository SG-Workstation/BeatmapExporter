name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - run: dotnet publish BeatmapExporterCLI -c Release
      - run: dotnet publish BeatmapExporterGUI.Desktop -c Release

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeatmapExporterCLI
          path: BeatmapExporterCLI/bin/Release/net10.0/publish/

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeatmapExporterGUI
          path: BeatmapExporterGUI.Desktop/bin/Release/net10.0/publish/
