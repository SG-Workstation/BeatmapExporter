name: Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        project:
          - name: CLI
            path: BeatmapExporterCLI
          - name: Desktop
            path: BeatmapExporterGUI.Desktop
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev

      - run: dotnet publish ${{ matrix.project.path }} -c Release -o output/${{ matrix.project.name }}

      - name: Strip debug symbols
        run: Remove-Item -Force "output/${{ matrix.project.name }}/*.pdb" -ErrorAction SilentlyContinue
        shell: pwsh

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.project.name }}-${{ runner.os }}
          path: output/${{ matrix.project.name }}/
